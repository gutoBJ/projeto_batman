<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Contato - Batman Site</title>
    <link rel="stylesheet" href="../src/css/contato.css">
    <link rel="icon" href="https://img.icons8.com/?size=512&id=oVlMEQNqsVUI&format=png">
</head>
<body>
    <header>
        <a href="../index.html"><img style="object-fit: contain; cursor: pointer;" class="logo" src="../src/mídia/logobatman.png" alt="Logo do Batman" title="Logo - Batman Movie"></a>
        <nav>
            <ul>
                <div class="div-lista">
                    <a href="../index.html">
                        <li class="lista" title="Página inicial">Home</li>
                    </a>
                </div>

                <div class="div-lista div-selecionado">
                    <a href="./contato.html">
                        <li class="lista selecionado" title="Entre em contato comigo">Contato</li>
                    </a>
                </div>

                <div class="div-lista">
                    <a href="./foto.html">
                        <li class="lista" title="Veja mais fotos">Fotos</li>
                    </a>
                </div>

                <div class="div-lista">
                    <a href="./comentarios.html">
                        <li class="lista" title="Veja comentários">Comentários</li>
                    </a>
                </div>
            </ul>
        </nav>
    </header>

    <div class="div-principal">
        <section class="contato">

            <form class="form" action="./obrigado.html">
                <div class="alinhar-contato">
                    <h1 id="titulo">Contato</h1>
                </div>
                <div id="principal">
                    <label class="label" for="nome">Nome:</label>
                    <input style="display: block;" class="inputs" id="nome" type="text" name="nome" placeholder="Insira seu nome completo" title="Preencha este campo" required>
    
                    <label class="label" for="email">E-mail:</label>
                    <input style="display: block;" class="inputs" id="email" type="email" name="email" placeholder="Insira um email válido" title="Preencha este campo" required>
    
                    <label class="label" for="tel">Telefone:</label>
                    <input style="display: block;" class="inputs" id="tel" type="tel" name="telefone" placeholder="Insira um telefone válido" title="Preencha este campo" required>
                </div>
    
                <div id="secundário">
                    <label class="label" for="know">Como nos conheceu?</label>
                    <select style="display: block;" name="como-nos-conheceu" id="know" required>
                        <option selected disabled value="selecione aqui">Selecione aqui</option>
                        <option value="busca pelo google">Busca pelo google</option>
                        <option value="instagram">Instagram</option>
                        <option value="twiter">Twiter</option>
                        <option value="facebook">Facebook</option>
                        <option value="outros links">Outros anúncios</option>
                        <option value="outros">Outros</option>
                    </select>
    
                    <label class="label" for="msg">Mensagem:</label>
                    <textarea class="textarea" style="display: block;" name="msg" id="msg" cols="48" rows="10" placeholder="Digite sua mensagem" required>

                    </textarea>
                </div>
    
                <div class="botao">
                    <button id="enviar" type="submit">Enviar</button>
                </div>
            </form>
        </section>
    
        <section class="informacoes">
    
        </section>
    </div>

    <footer>
        <a href="../index.html"><img style="object-fit: contain; cursor: pointer;" class="logo" src="../src/mídia/logobatman.png" alt="Logo do Batman" title="Logo - Batman Movie"></a>
        <div class="alinhar-span">
            <span style="margin-bottom: 10px;">Todos os direitos reservados ©</span>
            <span>Desenvolvido por: Augusto Chupernate</span>
        </div>
        <nav class="footer-navigation">
            <ul class="footer-list">
                <div class="div-lista">
                    <a href="../index.html">
                        <li class="lista" title="Página inicial">Home</li>
                    </a>
                </div>

                <div class="div-lista div-selecionado">
                    <a href="./contato.html">
                        <li class="lista selecionado" title="Entre em contato comigo">Contato</li>
                    </a>
                </div>

                <div class="div-lista">
                    <a href="./foto.html">
                        <li class="lista" title="Veja mais fotos">Fotos</li>
                    </a>
                </div>

                <div class="div-lista">
                    <a href="./comentarios.html">
                        <li class="lista" title="Veja comentários">Comentários</li>
                    </a>
                </div>
            </ul>
        </nav>
    </footer>
</body>
</html>
